<div class="h-full flex flex-col bg-background">
  <div class="p-6 pb-0 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Historial de Notificaciones</h1>
      <p class="text-sm text-gray-500 mt-1">Revisa todas tus alertas y aprobaciones pasadas.</p>
    </div>
    <div class="flex items-center gap-3">
      <button 
        (click)="markAllAsRead()"
        class="text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg"
      >
        Marcar todas como leídas
      </button>
      <button 
        (click)="goBack()"
        class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg flex items-center gap-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
        </svg>
        Volver
      </button>
    </div>
  </div>

  <div class="flex-1 overflow-auto p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-2">
      
      <div *ngIf="notifications().length === 0" class="py-20 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-50 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-gray-400">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
          </svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900">No hay notificaciones</h3>
        <p class="text-gray-500 mt-1">Aún no has recibido ninguna notificación en el sistema.</p>
      </div>

      <ul *ngIf="notifications().length > 0" class="divide-y divide-gray-100">
        <li *ngFor="let notif of notifications(); trackBy: trackByFn" (click)="onNotificationClick(notif)" class="p-4 hover:bg-gray-50/80 rounded-xl cursor-pointer transition-colors flex gap-4 group relative" [ngClass]="{'bg-blue-50/30': !notif.isRead}">
          <!-- Icon -->
          <div class="shrink-0 mt-1">
            <div *ngIf="notif.type === 'success'" class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-600 shadow-sm">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <div *ngIf="notif.type === 'error'" class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-600 shadow-sm">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </div>
            <div *ngIf="notif.type === 'warning'" class="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600 shadow-sm">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            </div>
            <div *ngIf="notif.type !== 'success' && notif.type !== 'error' && notif.type !== 'warning'" class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shadow-sm">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
          </div>
          
          <!-- Content -->
          <div class="flex-1 min-w-0 pr-8">
            <div class="flex items-center justify-between">
              <p class="text-sm font-bold text-gray-900 truncate" [class.text-blue-900]="!notif.isRead">
                {{ notif.title }}
              </p>
              <p class="text-[11px] text-gray-400 font-medium whitespace-nowrap ml-4">
                {{ notif.createdAt | date:'medium' }}
              </p>
            </div>
            <p class="text-sm text-gray-600 mt-1 leading-relaxed">
              {{ notif.message }}
            </p>
          </div>

          <!-- Unread Dot -->
          <div *ngIf="!notif.isRead" class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center">
            <div class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-[0_0_6px_rgba(59,130,246,0.5)]"></div>
          </div>
        </li>
      </ul>
    </div>
  </div>
</div>
