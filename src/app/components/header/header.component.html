<header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center px-6 lg:px-8 shadow-sm">
  <!-- Brand / Logo -->
  <div class="flex items-center">
    <img src="/logo.svg" alt="Viatika Logo" class="h-8 max-w-[160px]" />
  </div>

  <!-- User Actions -->
  <div class="flex items-center gap-3">
    @if (isColaborador()) {
    <a
      routerLink="/saldo"
      class="flex items-center gap-2 px-3 py-2 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300 font-semibold text-sm hover:bg-emerald-100 dark:hover:bg-emerald-900/40 transition-colors"
      title="Saldo disponible"
    >
      <span class="material-symbols-outlined text-lg">account_balance_wallet</span>
      <span>Saldo: S/ {{ saldoService.total() | number: '1.2-2' }}</span>
    </a>
    }
    <button
      (click)="logout()" 
      class="flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 px-4 py-2 rounded-lg font-semibold text-sm transition-colors cursor-pointer group"
    >
      <span class="material-symbols-outlined text-xl group-hover:text-rose-500 transition-colors">logout</span>
      <span class="hidden sm:block group-hover:text-rose-500 transition-colors">Cerrar Sesión</span>
    </button>
  </div>
</header>
