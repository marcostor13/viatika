<div class="relative inline-block">
  <!-- Bell Button -->
  <button 
    (click)="toggleDropdown($event)"
    class="relative p-2 text-tertiary hover:text-primary transition-colors focus:outline-none"
    aria-label="Notificaciones"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
    </svg>
    
    <!-- Badge Unread Count -->
    <span *ngIf="unreadCount() > 0" class="absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-bold leading-none text-white bg-red-500 rounded-full transform translate-x-1/4 -translate-y-1/4 border-2 border-quaternary">
      {{ unreadCount() > 99 ? '99+' : unreadCount() }}
    </span>
  </button>

  <!-- Dropdown -->
  <div 
    *ngIf="isOpen()"
    class="absolute right-0 mt-2 w-80 sm:w-96 bg-white rounded-xl shadow-2xl border border-gray-100 z-50 overflow-hidden flex flex-col"
    style="max-height: 80vh;"
  >
    <!-- Header -->
    <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/80 backdrop-blur-sm">
      <h3 class="text-sm font-semibold text-gray-800">Notificaciones</h3>
      <button 
        *ngIf="unreadCount() > 0"
        (click)="markAllAsRead($event)" 
        class="text-xs text-blue-600 hover:text-blue-800 font-medium transition-colors"
      >
        Marcar todas leídas
      </button>
    </div>

    <!-- List -->
    <div class="overflow-y-auto w-full flex-1 max-h-[60vh] custom-scrollbar">
      <div *ngIf="notifications().length === 0" class="px-4 py-10 text-center text-gray-500 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10 mx-auto text-gray-300 mb-3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
        </svg>
        No tienes notificaciones
      </div>

      <ul *ngIf="notifications().length > 0" class="divide-y divide-gray-100">
        <li *ngFor="let notif of notifications(); trackBy: trackByFn" (click)="onNotificationClick(notif, $event)" class="px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors flex gap-3 group relative" [ngClass]="{'bg-blue-50/30': !notif.isRead}">
          <!-- Icon based on type -->
          <div class="shrink-0 mt-0.5">
            <div *ngIf="notif.type === 'success'" class="w-8 h-8 rounded-full bg-green-100/50 flex items-center justify-center text-green-600">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <div *ngIf="notif.type === 'error'" class="w-8 h-8 rounded-full bg-red-100/50 flex items-center justify-center text-red-600">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </div>
            <div *ngIf="notif.type === 'warning'" class="w-8 h-8 rounded-full bg-yellow-100/50 flex items-center justify-center text-yellow-600">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            </div>
            <div *ngIf="notif.type !== 'success' && notif.type !== 'error' && notif.type !== 'warning'" class="w-8 h-8 rounded-full bg-blue-100/50 flex items-center justify-center text-blue-600">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
          </div>
          <div class="flex-1 min-w-0 pr-4">
            <p class="text-sm font-semibold text-gray-900 truncate" [class.text-blue-900]="!notif.isRead">
              {{ notif.title }}
            </p>
            <p class="text-xs text-gray-500 line-clamp-2 mt-0.5 leading-relaxed">
              {{ notif.message }}
            </p>
            <p class="text-[10px] text-gray-400 mt-1.5 font-medium">
              {{ notif.createdAt | date:'dd MMM yyyy, HH:mm' }}
            </p>
          </div>
          <div *ngIf="!notif.isRead" class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center">
            <div class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_4px_rgba(59,130,246,0.5)]"></div>
          </div>
        </li>
      </ul>
    </div>

    <!-- Footer -->
    <div class="px-4 py-2 border-t border-gray-100 bg-gray-50/50 text-center backdrop-blur-sm">
      <button 
        (click)="viewAll($event)"
        class="text-xs font-semibold text-gray-500 hover:text-gray-900 transition-colors py-1.5 w-full"
      >
        Ver todas las notificaciones
      </button>
    </div>
  </div>
</div>
