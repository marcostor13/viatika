<div class="px-5 lg:block hidden">
  <app-table
    [headers]="headers"
    [data]="data"
    (clickOptionsEvent)="clickOptions($event)"
    (rowClick)="rowClick.emit($event)"
  ></app-table>
</div>

<div class="px-5 block lg:hidden">
  <app-list-table
    [headers]="headers"
    [data]="data"
    (clickOptionsEvent)="clickOptions($event)"
    (rowClick)="rowClick.emit($event)"
  ></app-list-table>
</div>

@if(data.length === 0) {
<div class="mx-5 mt-4 text-center p-8 bg-background rounded border border-divider">
  <p class="text-sm text-tertiary">No hay datos para mostrar.</p>
</div>
}
