<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-sm" [style.minWidth]="minWidth">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-200">
          @if (expandable) {
            <th class="px-2 py-3 w-8"></th>
          }
          @for (col of mainCols; track col.key) {
            <th
              class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider"
              [ngClass]="[alignClass(col.align), col.hideOn, col.headerClass]"
            >
              {{ col.header }}
            </th>
          }
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        @for (row of items; track trackRow($index, row)) {
          <tr
            class="hover:bg-gray-50 transition-colors"
            [class.cursor-pointer]="rowClickable"
            [class.bg-gray-50]="expandable && isExpanded(row)"
            (click)="onRowClick(row, $event)"
          >
            @if (expandable) {
              <td class="px-2 py-3.5 align-top">
                <button
                  type="button"
                  (click)="toggleExpand(row, $event)"
                  title="Ver más"
                  [attr.aria-expanded]="isExpanded(row)"
                  class="inline-flex items-center justify-center w-6 h-6 rounded-md text-gray-400 hover:bg-gray-100 hover:text-gray-700 transition-colors"
                >
                  <svg class="w-4 h-4 transition-transform" [class.rotate-90]="isExpanded(row)" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                  </svg>
                </button>
              </td>
            }
            @for (col of mainCols; track col.key) {
              <td
                class="px-4 py-3.5 align-top"
                [ngClass]="[alignClass(col.align), col.hideOn, col.cellClass]"
              >
                <ng-container
                  *ngTemplateOutlet="col.tpl; context: { $implicit: row, index: $index }"
                ></ng-container>
              </td>
            }
          </tr>

          @if (expandable && isExpanded(row)) {
            <tr class="bg-gray-50/60">
              <td class="px-4 pb-3.5 pt-0" [attr.colspan]="detailColspan">
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-2 pl-8">
                  @for (col of detailCols; track col.key) {
                    <div>
                      <span class="block text-gray-400 uppercase tracking-wide text-[10px] font-semibold">{{ col.header }}</span>
                      <div class="text-sm break-words" [ngClass]="col.cellClass">
                        <ng-container
                          *ngTemplateOutlet="col.tpl; context: { $implicit: row, index: $index }"
                        ></ng-container>
                      </div>
                    </div>
                  }
                </div>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</div>
