@if (showSignatureModal) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-quaternary rounded-2xl border border-tertiary/20 shadow-soft p-6 max-w-sm w-full flex flex-col gap-4">
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-full bg-warning/10 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-warning">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Z" />
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold text-secondary">Firma digital no configurada</p>
          <p class="text-xs text-tertiary mt-1">Debe configurar su firma digital para poder firmar documentos y rendiciones en la plataforma.</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button
          (click)="goToSignature()"
          class="flex-1 px-4 py-2 text-sm font-semibold bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors"
        >
          Configurar firma
        </button>
        <button
          (click)="dismissSignatureModal()"
          class="px-4 py-2 text-sm font-medium text-tertiary hover:text-secondary rounded-lg hover:bg-background transition-colors"
        >
          Ahora no
        </button>
      </div>
    </div>
  </div>
}

<div class="flex h-screen bg-background">
  <app-sidebar
    [sidebarVisible]="sidebarVisible"
    (sidebarToggle)="toggleSidebar()"
  >
  </app-sidebar>

  <div class="flex-1 flex flex-col lg:ml-0 overflow-x-hidden">
    <header
      class="relative bg-quaternary shadow-soft border-b border-tertiary/20 lg:ml-0 lg:pl-0 pl-16"
    >
      <button
        (click)="toggleSidebar()"
        class="lg:hidden absolute top-1/2 left-4 -translate-y-1/2 z-40 p-3 rounded-xl bg-quaternary shadow-soft text-secondary hover:text-primary hover:bg-background transition-all duration-300 hover:shadow-lg hover:scale-105 group border border-tertiary/20"
      >
        <div class="relative w-6 h-6 flex flex-col justify-center space-y-1">
          <div class="w-6 h-0.5 bg-current"></div>
          <div class="w-6 h-0.5 bg-current"></div>
          <div class="w-6 h-0.5 bg-current"></div>
        </div>
      </button>

      <div class="flex items-center justify-end px-6 py-4">
        <div class="flex items-center space-x-4">
          <app-notification-bell></app-notification-bell>

        </div>
      </div>
    </header>

    <main class="flex-1 overflow-auto bg-background">
      <div class="p-2 sm:p-4 md:p-6">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
